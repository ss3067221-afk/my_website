<!DOCTYPE html>
<html>
<head>
    <title>My Pro Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
        }

        .card {
            background: white;
            width: 300px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px gray;
        }

        img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
        }

        h1 {
            color: darkblue;
        }

        button {
            background: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>

</head>

<body>

    <h1>Welcome to My Website 🚀</h1>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="My Photo">

        <h2>Tanishka Sonawane</h2>
        <p>Computer Engineering Student 💻</p>

        <h3>Skills</h3>
        <p>HTML | Programming | Learning Tech</p>

        <button onclick="alert('Hello! Thanks for visiting 😄')">
            Click Me
        </button>
    </div>

</body>
</html>
