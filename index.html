<!DOCTYPE html>
<html>
<head>
    <title>Tanishka Sonawane | Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-image: url('https://source.unsplash.com/1600x900/?technology');
            background-size: cover;
            background-attachment: fixed;
        }

        /* Navbar */
        .navbar {
            background: black;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        .navbar a:hover {
            color: yellow;
        }

        /* Hero */
        .hero {
            color: white;
            padding: 80px;
            text-align: center;
            background: rgba(0,0,0,0.6);
        }

        /* Sections */
        .section {
            padding: 50px;
            text-align: center;
            background: rgba(255,255,255,0.8);
            margin: 20px;
            border-radius: 15px;
        }

        h1, h2 {
            color: darkblue;
        }

        /* Skills */
        .skills span {
            display: inline-block;
            background: blue;
            color: white;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
        }

        /* Gallery */
        .gallery img {
            width: 150px;
            margin: 10px;
            border-radius: 10px;
        }

        /* Button */
        button {
            background: red;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }

        /* Footer */
        .footer {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
</div>

<!-- Hero -->
<div class="hero" id="home">
    <h1>Hi, I am Tanishka Sonawane 👋</h1>
    <p>Computer Engineering Student 💻</p>
    <img src="https://i.pravatar.cc/150" style="border-radius:50%; margin-top:10px;">
</div>

<!-- About -->
<div class="section" id="about">
    <h2>About Me</h2>
    <p>I love coding and learning new technology 🚀</p>
</div>

<!-- Skills -->
<div class="section skills" id="skills">
    <h2>My Skills</h2>
    <span>HTML</span>
    <span>CSS</span>
    <span>Programming</span>
</div>

<!-- Gallery -->
<div class="section gallery" id="gallery">
    <h2>Gallery</h2>
    <img src="https://source.unsplash.com/200x200/?coding">
    <img src="https://source.unsplash.com/200x200/?laptop">
    <img src="https://source.unsplash.com/200x200/?developer">
</div>

<!-- Contact -->
<div class="section" id="contact">
    <h2>Contact Me</h2>
    <p>Email: example@gmail.com</p>
    <button onclick="alert('Message Sent 😄')">Send Message</button>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 Tanishka Sonawane</p>
</div>

</body>
</html>
